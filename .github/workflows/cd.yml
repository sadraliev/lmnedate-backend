name: CD

on:
  workflow_dispatch:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

concurrency:
  group: cd-main
  cancel-in-progress: false

jobs:
  playwright:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
          fetch-depth: 2

      - name: Check for Playwright changes
        id: filter
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          elif git diff --name-only HEAD~1 HEAD | grep -qE '^apps/scraper/(Dockerfile|server\.js)$'; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Log in to GHCR
        if: steps.filter.outputs.changed == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3
        if: steps.filter.outputs.changed == 'true'

      - name: Build and push Playwright image
        if: steps.filter.outputs.changed == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/scraper/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/playwright:latest
            ghcr.io/${{ github.repository }}/playwright:${{ github.event.workflow_run.head_sha || github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    needs: playwright
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build (esbuild bundles)
        run: node scripts/build.js

      - name: Deploy to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          source: >-
            apps/bot/dist/bot.js,apps/bot/dist/bot.js.map,
            apps/workers/dist/main.js,apps/workers/dist/main.js.map,
            apps/scraper/dist/worker.js,apps/scraper/dist/worker.js.map,
            deploy-package.json,
            ecosystem.config.cjs,docker-compose.prod.yml
          target: ~/app

      - name: Start services on EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          script: |
            cd ~/app
            mkdir -p ~/.scraper

            cat > .env << 'ENVEOF'
            MONGODB_URI=mongodb://localhost:27019/fastify-app
            MONGODB_DB=fastify-app
            REDIS_URL=redis://localhost:6381
            TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}
            INSTAGRAM_USERNAME=${{ secrets.INSTAGRAM_USERNAME }}
            INSTAGRAM_PASSWORD=${{ secrets.INSTAGRAM_PASSWORD }}
            SCRAPE_CONCURRENCY=1
            SCRAPE_TIMEOUT_MS=30000
            IG_SESSION_PATH=~/.scraper/ig-session.json
            PLAYWRIGHT_WS=ws://localhost:3000/ws
            ENVEOF

            cp deploy-package.json package.json
            npm install --prod

            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker compose -f docker-compose.prod.yml pull playwright
            docker compose -f docker-compose.prod.yml up -d

            pm2 reload ecosystem.config.cjs --update-env || pm2 start ecosystem.config.cjs
            pm2 save

            # healthcheck
            sleep 3
            pm2 ls
            docker ps
            docker image prune -af
