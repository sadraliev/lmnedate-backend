services:
  mongodb:
    image: mongo:7
    container_name: fastify-app-mongodb
    restart: unless-stopped
    ports:
      - "27019:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: fastify-app-redis
    restart: unless-stopped
    ports:
      - "6381:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  scraper:
    build:
      context: .
      dockerfile: apps/scraper/Dockerfile.dev
    container_name: fastify-app-scraper
    restart: unless-stopped
    environment:
      REDIS_URL: redis://redis:6379
      MONGODB_URI: mongodb://mongodb:27017/instagram-scraper
      SCRAPE_CONCURRENCY: "1"
      SCRAPE_TIMEOUT_MS: "30000"
      INSTAGRAM_USERNAME: ${INSTAGRAM_USERNAME:-}
      INSTAGRAM_PASSWORD: ${INSTAGRAM_PASSWORD:-}
    volumes:
      - ./apps/scraper/src:/app/apps/scraper/src
      - ./packages/shared/src:/app/packages/shared/src
    command: ["pnpm", "--filter", "@app/scraper", "dev"]
    depends_on:
      redis:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1.0'

  bull-board:
    image: venatum/bull-board
    container_name: fastify-app-bull-board
    restart: unless-stopped
    ports:
      - "3333:3000"
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  mongo_data:
    driver: local
  redis_data:
    driver: local
