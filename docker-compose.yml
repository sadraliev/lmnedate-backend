services:
  redis:
    image: redis:7-alpine
    container_name: fastify-app-redis
    restart: unless-stopped
    ports:
      - "6381:6379"  # Non-default port (6381 on host -> 6379 in container)
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  bot:
    build:
      context: .
      dockerfile: scraper.Dockerfile
    container_name: fastify-app-bot
    restart: unless-stopped
    environment:
      REDIS_URL: redis://redis:6379
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
    volumes:
      - ./src:/app/src
      - ./tsconfig.json:/app/tsconfig.json
    command: ["npx", "tsx", "--watch", "src/bot.ts"]
    depends_on:
      redis:
        condition: service_healthy

  instagram-scraper:
    build:
      context: .
      dockerfile: scraper.Dockerfile
    container_name: fastify-app-instagram-scraper
    restart: unless-stopped
    environment:
      REDIS_URL: redis://redis:6379
      SCRAPE_CONCURRENCY: "1"
      SCRAPE_TIMEOUT_MS: "30000"
      INSTAGRAM_USERNAME: ${INSTAGRAM_USERNAME:-}
      INSTAGRAM_PASSWORD: ${INSTAGRAM_PASSWORD:-}
    volumes:
      - ./src:/app/src
      - ./tsconfig.json:/app/tsconfig.json
    command: ["npx", "tsx", "--watch", "src/scraper-worker.ts"]
    depends_on:
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1.0'

  bull-board:
    image: venatum/bull-board
    container_name: fastify-app-bull-board
    restart: unless-stopped
    ports:
      - "3333:3000"  # Bull Board UI on port 3333
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  redis_data:
    driver: local
